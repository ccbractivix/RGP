<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida Space Launch Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <h1 class="site-title">Florida Space Launch Tracker</h1>
        <p class="site-subtitle">Live countdowns for Cape Canaveral &amp; Kennedy Space Center</p>
    </header>

    <main class="launches-container" id="launches-container">
        <div class="no-launches">
            <h2>Loading launches...</h2>
            <p>Fetching the latest Florida launch schedule</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-brand">Florida Space Launch Tracker</div>
        <div class="footer-disclaimer">Launch data provided by Launch Library 2. Times shown are estimates and subject to change.</div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
