<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-url" content="https://rentals-backend-unp1.onrender.com">
  <title>Disc Rentals – Operator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f172a;
      --card:       #1e293b;
      --border:     #334155;
      --text:       #e2e8f0;
      --muted:      #94a3b8;
      --green:      #22c55e;
      --green-dim:  rgba(34,197,94,0.15);
      --amber:      #f59e0b;
      --amber-dim:  rgba(245,158,11,0.15);
      --red:        #ef4444;
      --red-dim:    rgba(239,68,68,0.15);
      --blue:       #3b82f6;
      --blue-dim:   rgba(59,130,246,0.15);
      --purple:     #a855f7;
      --purple-dim: rgba(168,85,247,0.15);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    /* ── Login ─────────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    #login-screen h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    #login-screen p  { color: var(--muted); margin-bottom: 24px; font-size: 13px; }

    .code-input {
      width: 160px; padding: 14px; font-size: 24px;
      font-family: inherit; text-align: center; letter-spacing: 8px;
      background: var(--card); color: var(--text);
      border: 2px solid var(--border); border-radius: 10px; outline: none;
    }

    .code-input:focus { border-color: var(--blue); }

    .login-btn {
      margin-top: 16px; padding: 12px 40px; font-size: 15px;
      font-weight: 600; background: var(--blue); color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }

    .login-error { color: var(--red); margin-top: 12px; font-size: 13px; min-height: 20px; }

    /* ── Dashboard ─────────────────────────────────────────────────── */
    #dashboard { display: none; }

    .dash-header {
      background: #020617;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .dash-header h1 { font-size: 15px; font-weight: 700; }

    .logout-btn {
      font-size: 12px; color: var(--muted); background: none;
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; cursor: pointer;
    }

    /* Session bar */
    .session-bar {
      background: var(--blue-dim);
      border-bottom: 1px solid var(--blue);
      padding: 8px 16px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .session-bar.active { display: flex; }
    .session-info { font-size: 12px; color: var(--text); }
    .session-info strong { color: var(--blue); }

    .session-actions { display: flex; gap: 6px; }

    /* Controls */
    .controls {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #020617;
      border-bottom: 1px solid var(--border);
    }

    .search-row {
      position: relative;
    }

    .search-row input {
      width: 100%;
      padding: 8px 32px 8px 10px;
      font-size: 14px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
    }

    .search-row input:focus { border-color: var(--blue); }

    .search-row .clear-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      font-size: 16px; cursor: pointer; display: none;
    }

    .filter-row {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .fpill {
      flex-shrink: 0;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }

    .fpill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* List */
    .list-meta {
      padding: 8px 14px 4px;
      font-size: 11px;
      color: var(--muted);
    }

    #title-list { padding: 0 12px 100px; }

    /* Title row */
    .title-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 13px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .title-row:active { opacity: 0.8; }

    .title-row-main { flex: 1; min-width: 0; }

    .title-row-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-row-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Buttons */
    .btn {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active   { opacity: 0.8; }

    .btn-green  { background: var(--green); color: #000; }
    .btn-red    { background: var(--red);   color: #fff; }
    .btn-blue   { background: var(--blue);  color: #fff; }
    .btn-amber  { background: var(--amber); color: #000; }
    .btn-purple { background: var(--purple);color: #fff; }
    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Status badge */
    .status-badge {
      padding: 3px 9px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 999px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .s-available { background: var(--green-dim);  color: var(--green);  }
    .s-out       { background: var(--red-dim);    color: var(--red);    }
    .s-reserved  { background: var(--amber-dim);  color: var(--amber);  }

    /* ── Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px 18px 36px;
      width: 100%;
      max-width: 500px;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .modal .modal-sub {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .modal input, .modal select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      margin-bottom: 12px;
    }

    .modal input:focus { border-color: var(--blue); }

    .modal-error {
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--red);
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Copy list in checkin modal */
    .copy-list { margin-bottom: 14px; }

    .copy-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .copy-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .copy-item-label { font-size: 13px; font-weight: 600; }
    .copy-item-info  { font-size: 11px; color: var(--muted); }
    .copy-item-btns  { display: flex; gap: 5px; margin-top: 8px; }

    /* Reservation list */
    .res-item {
      background: var(--amber-dim);
      border: 1px solid var(--amber);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .res-item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* Cart badge in session bar */
    .cart-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      background: var(--blue);
      color: #fff;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #334155;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    .divider { margin: 12px 0; border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>🎬 Operator Panel</h1>
    <p>Disc Rentals — Enter your 4-digit code</p>
    <input type="tel" maxlength="4" pattern="\d{4}" class="code-input" id="code-input" inputmode="numeric" autocomplete="off">
    <button class="login-btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="dash-header">
      <h1>🎬 Operator Panel</h1>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </div>

    <!-- Session bar (shown while building a checkout) -->
    <div class="session-bar" id="session-bar">
      <div class="session-info" id="session-info"></div>
      <div class="session-actions">
        <button class="btn btn-green" id="session-checkout-btn">Check Out</button>
        <button class="btn btn-outline" id="session-clear-btn">Clear</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search titles…" autocomplete="off">
        <button class="clear-btn" id="search-clear">✕</button>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="fpill active" data-f="all">All</button>
        <button class="fpill" data-f="available">Available</button>
        <button class="fpill" data-f="out">Out</button>
        <button class="fpill" data-f="reserved">Reserved</button>
        <button class="fpill" data-f="movie">Movies</button>
        <button class="fpill" data-f="game">Games</button>
      </div>
    </div>

    <div class="list-meta" id="list-meta"></div>
    <div id="title-list"></div>
  </div>

  <!-- Action Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    var metaTag  = document.querySelector('meta[name="api-url"]');
    var BASE_URL = (metaTag && metaTag.getAttribute('content')) || '';

    var authCode     = localStorage.getItem('op_code') || '';
    var allTitles    = [];
    var activeFilter = 'all';
    var searchQuery  = '';

    // Checkout session: {roomNumber, lastName, items:[{copyId,copyLabel,titleName}]}
    var session = null;

    // ── Helpers ───────────────────────────────────────────────────────────────

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fuzzy(title, q) {
      if (!q) return true;
      var hay = (title || '').toLowerCase();
      return q.toLowerCase().trim().split(/\s+/).every(function (w) { return hay.includes(w); });
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2500);
    }

    function apiCall(method, path, body) {
      var opts = {
        method: method,
        headers: { 'Content-Type': 'application/json', 'X-Auth-Code': authCode },
      };
      if (body) opts.body = JSON.stringify(body);
      return fetch(BASE_URL + path, opts).then(function (r) {
        if (r.status === 401) { localStorage.removeItem('op_code'); authCode = ''; showLogin(); throw new Error('Unauthorized'); }
        return r.json();
      });
    }

    // ── Auth ──────────────────────────────────────────────────────────────────

    function showLogin() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadTitles();
    }

    document.getElementById('login-btn').addEventListener('click', function () {
      var code = document.getElementById('code-input').value.trim();
      if (!/^\d{4}$/.test(code)) { document.getElementById('login-error').textContent = 'Enter a 4-digit code'; return; }
      fetch(BASE_URL + '/operator/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code }),
      }).then(function (r) { return r.json(); }).then(function (d) {
        if (d.valid) {
          authCode = code;
          localStorage.setItem('op_code', code);
          document.getElementById('login-error').textContent = '';
          showDashboard();
        } else {
          document.getElementById('login-error').textContent = 'Invalid code';
        }
      }).catch(function () { document.getElementById('login-error').textContent = 'Connection error'; });
    });

    document.getElementById('code-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      localStorage.removeItem('op_code'); authCode = ''; showLogin();
    });

    // ── Load ──────────────────────────────────────────────────────────────────

    function loadTitles() {
      apiCall('GET', '/operator/titles').then(function (d) {
        allTitles = d.titles || [];
        render();
      }).catch(function (e) {
        if (e.message !== 'Unauthorized') showToast('Failed to load titles');
      });
    }

    // ── Session bar ───────────────────────────────────────────────────────────

    function updateSessionBar() {
      var bar = document.getElementById('session-bar');
      if (!session || session.items.length === 0) { bar.classList.remove('active'); return; }
      bar.classList.add('active');
      var count = session.items.length;
      var names = session.items.map(function (i) { return i.titleName; }).join(', ');
      document.getElementById('session-info').innerHTML =
        '<strong>' + count + ' title' + (count > 1 ? 's' : '') + '</strong> — Room ' + esc(session.roomNumber) + ', ' + esc(session.lastName) +
        '<br><small style="color:var(--muted)">' + esc(names) + '</small>';
    }

    document.getElementById('session-checkout-btn').addEventListener('click', function () {
      if (!session || session.items.length === 0) return;
      this.disabled = true;
      var self = this;
      var copyIds = session.items.map(function (i) { return i.copyId; });
      apiCall('POST', '/operator/checkout', {
        room_number: session.roomNumber,
        last_name: session.lastName,
        copy_ids: copyIds,
      }).then(function (d) {
        if (d.ok) {
          showToast('✅ Checked out ' + session.items.length + ' title(s) to Room ' + session.roomNumber);
          session = null;
          updateSessionBar();
          loadTitles();
        } else {
          showToast('❌ Error: ' + (d.error || 'Checkout failed'));
        }
      }).catch(function () { showToast('Connection error'); })
      .finally(function () { self.disabled = false; });
    });

    document.getElementById('session-clear-btn').addEventListener('click', function () {
      session = null;
      updateSessionBar();
      showToast('Session cleared');
    });

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      var filtered = allTitles.filter(function (t) {
        if (!fuzzy(t.title, searchQuery)) return false;
        if (activeFilter === 'movie' || activeFilter === 'game') return t.format === activeFilter;
        if (activeFilter === 'available' || activeFilter === 'out' || activeFilter === 'reserved') return t.status === activeFilter;
        return true;
      });

      document.getElementById('list-meta').textContent = filtered.length + ' title' + (filtered.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        document.getElementById('title-list').innerHTML =
          '<div style="text-align:center;padding:40px 20px;color:var(--muted)">No titles found</div>';
        return;
      }

      var html = '';
      filtered.forEach(function (t) {
        var badgeCls = t.status === 'available' ? 's-available' : t.status === 'reserved' ? 's-reserved' : 's-out';
        var badgeTxt = t.status.charAt(0).toUpperCase() + t.status.slice(1);
        var sub = (t.format === 'movie' ? 'Movie' : 'Game');
        if (t.year) sub += ' · ' + t.year;
        if (t.format === 'movie' && t.mpaaRating) sub += ' · ' + t.mpaaRating;
        if (t.format === 'game' && t.esrbRating) sub += ' · ESRB ' + t.esrbRating;
        sub += ' · ' + t.availableCount + ' avail / ' + t.outCount + ' out';

        html += '<div class="title-row" data-id="' + t.id + '">';
        html += '  <div class="title-row-main">';
        html += '    <div class="title-row-name">' + esc(t.title) + '</div>';
        html += '    <div class="title-row-sub">' + esc(sub) + '</div>';
        html += '  </div>';
        html += '  <span class="status-badge ' + badgeCls + '">' + badgeTxt + '</span>';
        html += '</div>';
      });

      document.getElementById('title-list').innerHTML = html;

      document.querySelectorAll('.title-row').forEach(function (row) {
        row.addEventListener('click', function () { openModal(this.getAttribute('data-id')); });
      });
    }

    // ── Controls ──────────────────────────────────────────────────────────────

    document.getElementById('filter-row').addEventListener('click', function (e) {
      var btn = e.target.closest('.fpill');
      if (!btn) return;
      activeFilter = btn.getAttribute('data-f');
      document.querySelectorAll('.fpill').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      render();
    });

    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', function () {
      searchQuery = this.value;
      searchClear.style.display = searchQuery ? 'block' : 'none';
      render();
    });

    searchClear.addEventListener('click', function () {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      render();
    });

    // ── Modal ─────────────────────────────────────────────────────────────────

    function openModal(titleId) {
      var t = allTitles.find(function (x) { return String(x.id) === String(titleId); });
      if (!t) return;

      // Load copies
      apiCall('GET', '/operator/copies/' + titleId).then(function (d) {
        renderModal(t, d.copies || [], d.reservations || []);
        document.getElementById('modal-overlay').classList.remove('hidden');
      }).catch(function () { showToast('Failed to load copy details'); });
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    function renderModal(title, copies, reservations) {
      var html = '';
      html += '<h2>' + esc(title.title) + '</h2>';
      html += '<div class="modal-sub">' + (title.format === 'movie' ? 'Movie' : 'Game');
      if (title.year) html += ' · ' + esc(title.year);
      html += '</div>';

      // Reservations section
      if (reservations.length > 0) {
        html += '<div style="margin-bottom:12px">';
        html += '<div style="font-size:12px;font-weight:600;color:var(--amber);margin-bottom:6px">⚠️ Active Reservations</div>';
        reservations.forEach(function (r) {
          var exp = new Date(r.expires_at);
          html += '<div class="res-item">';
          html += '<div class="res-item-top">';
          html += '<span><strong>' + esc(r.last_name) + '</strong> · Room ' + esc(r.room_number) + '</span>';
          html += '<button class="btn btn-outline" style="font-size:11px;padding:4px 8px" data-res-id="' + r.id + '" data-title-id="' + title.id + '">Cancel</button>';
          html += '</div>';
          html += '<div style="font-size:11px;color:var(--muted);margin-top:3px">Expires: ' + exp.toLocaleString('en-US',{hour:'numeric',minute:'2-digit',month:'short',day:'numeric',timeZone:'America/New_York'}) + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      // Available copies — show checkout option
      var availCopies = copies.filter(function (c) { return c.status === 'available'; });
      var outCopies   = copies.filter(function (c) { return c.status === 'out'; });

      if (availCopies.length > 0) {
        html += '<div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px">Available Copies</div>';

        if (!session) {
          // Show form to start or add to session
          html += '<label>Room Number</label>';
          html += '<input type="text" id="co-room" placeholder="e.g. 204" inputmode="numeric">';
          html += '<label>Last Name</label>';
          html += '<input type="text" id="co-name" placeholder="Guest last name">';
        } else {
          // Session already active
          html += '<div style="background:var(--blue-dim);border:1px solid var(--blue);border-radius:6px;padding:8px 10px;font-size:12px;margin-bottom:10px">';
          html += 'Adding to session: Room ' + esc(session.roomNumber) + ', ' + esc(session.lastName);
          html += '</div>';
        }

        html += '<label>Select Copy</label>';
        html += '<select id="co-copy">';
        availCopies.forEach(function (c) {
          html += '<option value="' + c.id + '">' + esc(c.copyLabel) + '</option>';
        });
        html += '</select>';
        html += '<div id="modal-error" style="display:none" class="modal-error"></div>';
        html += '<div class="modal-actions">';
        html += '<button class="btn btn-outline" id="modal-close-btn">Cancel</button>';

        var canAddMore = !session ? true : session.items.length < 2;
        if (canAddMore) {
          html += '<button class="btn btn-blue" id="co-add-btn">Add to Session</button>';
        }
        html += '<button class="btn btn-green" id="co-checkout-btn">Check Out Now</button>';
        html += '</div>';
      }

      if (outCopies.length > 0) {
        if (availCopies.length > 0) html += '<hr class="divider">';
        html += '<div style="font-size:12px;font-weight:600;color:var(--red);margin-bottom:8px">Checked Out Copies</div>';
        html += '<div class="copy-list">';
        outCopies.forEach(function (c) {
          var date = c.checkedOutAt ? new Date(c.checkedOutAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
          html += '<div class="copy-item">';
          html += '<div class="copy-item-top">';
          html += '<span class="copy-item-label">' + esc(c.copyLabel) + '</span>';
          html += '</div>';
          html += '<div class="copy-item-info">Room ' + esc(c.roomNumber||'?') + ' · ' + esc(c.lastName||'?') + ' · Out since ' + date + '</div>';
          html += '<div class="copy-item-btns">';
          html += '<button class="btn btn-green" data-ci-id="' + c.id + '" data-damaged="false">Check In</button>';
          html += '<button class="btn btn-red" data-ci-id="' + c.id + '" data-damaged="true">Check In as Damaged</button>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      if (availCopies.length === 0 && outCopies.length === 0) {
        html += '<div style="color:var(--muted);font-size:13px">No copies found for this title.</div>';
      }

      if (!(availCopies.length > 0)) {
        html += '<div class="modal-actions" style="margin-top:14px"><button class="btn btn-outline" id="modal-close-btn">Close</button></div>';
      }

      document.getElementById('modal-content').innerHTML = html;
      bindModalActions(title, copies);
    }

    function bindModalActions(title, copies) {
      // Close button(s)
      document.querySelectorAll('#modal-close-btn').forEach(function (btn) {
        btn.addEventListener('click', closeModal);
      });

      // Cancel reservation
      document.querySelectorAll('[data-res-id]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var resId = this.getAttribute('data-res-id');
          var tid   = this.getAttribute('data-title-id');
          this.disabled = true;
          var self = this;
          apiCall('DELETE', '/operator/reservation/' + resId).then(function () {
            showToast('Reservation cancelled');
            closeModal();
            loadTitles();
          }).catch(function () {
            showToast('Error cancelling reservation');
            self.disabled = false;
          });
        });
      });

      // Collect checkout form values (or use existing session)
      function getSessionInfo() {
        if (session) return { roomNumber: session.roomNumber, lastName: session.lastName };
        var room = (document.getElementById('co-room') || {}).value || '';
        var name = (document.getElementById('co-name') || {}).value || '';
        return { roomNumber: room.trim(), lastName: name.trim() };
      }

      function getSelectedCopyId() {
        var sel = document.getElementById('co-copy');
        return sel ? parseInt(sel.value, 10) : null;
      }

      function showModalError(msg) {
        var el = document.getElementById('modal-error');
        if (!el) return;
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
      }

      // Add to session
      var addBtn = document.getElementById('co-add-btn');
      if (addBtn) {
        addBtn.addEventListener('click', function () {
          var info   = getSessionInfo();
          var copyId = getSelectedCopyId();
          if (!info.roomNumber || !info.lastName) { showModalError('Enter room number and last name'); return; }
          if (!copyId) { showModalError('Select a copy'); return; }

          var copy = copies.find(function (c) { return c.id === copyId; });

          if (!session) {
            session = { roomNumber: info.roomNumber, lastName: info.lastName, items: [] };
          }

          if (session.items.length >= 3) { showModalError('Maximum 3 titles per checkout'); return; }
          if (session.items.some(function (i) { return i.copyId === copyId; })) { showModalError('Copy already in session'); return; }

          session.items.push({ copyId: copyId, copyLabel: copy ? copy.copyLabel : '?', titleName: title.title });
          updateSessionBar();
          closeModal();
          showToast(title.title + ' added to session (' + session.items.length + '/3)');
          loadTitles();
        });
      }

      // Check out immediately
      var coBtn = document.getElementById('co-checkout-btn');
      if (coBtn) {
        coBtn.addEventListener('click', function () {
          var info   = getSessionInfo();
          var copyId = getSelectedCopyId();

          if (!session && (!info.roomNumber || !info.lastName)) { showModalError('Enter room number and last name'); return; }
          if (!copyId) { showModalError('Select a copy'); return; }

          this.disabled = true;
          var self = this;

          var sessionItems = session ? session.items.slice() : [];
          if (!sessionItems.some(function (i) { return i.copyId === copyId; })) {
            sessionItems.push({ copyId: copyId });
          }

          apiCall('POST', '/operator/checkout', {
            room_number: info.roomNumber,
            last_name:   info.lastName,
            copy_ids:    sessionItems.map(function (i) { return i.copyId; }),
          }).then(function (d) {
            if (d.ok) {
              var total = sessionItems.length;
              showToast('✅ Checked out ' + total + ' title(s) to Room ' + info.roomNumber);
              session = null;
              updateSessionBar();
              closeModal();
              loadTitles();
            } else {
              showModalError(d.error || 'Checkout failed');
            }
          }).catch(function () { showModalError('Connection error'); })
          .finally(function () { self.disabled = false; });
        });
      }

      // Check in
      document.querySelectorAll('[data-ci-id]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var copyId  = parseInt(this.getAttribute('data-ci-id'), 10);
          var damaged = this.getAttribute('data-damaged') === 'true';
          var label   = this.textContent;

          if (damaged && !confirm('Mark this disc as DAMAGED? It will be removed from the library.')) return;

          this.disabled = true;
          var self = this;

          apiCall('POST', '/operator/checkin/' + copyId, { damaged: damaged }).then(function (d) {
            if (d.ok) {
              showToast(damaged ? '🔴 Disc marked as damaged' : '✅ Disc checked in');
              closeModal();
              loadTitles();
            } else {
              showToast('Error: ' + (d.error || 'Checkin failed'));
            }
          }).catch(function () { showToast('Connection error'); })
          .finally(function () { self.disabled = false; });
        });
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    if (authCode) { showDashboard(); } else { showLogin(); }
  })();
  </script>
</body>
</html>
