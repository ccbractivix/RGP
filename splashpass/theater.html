<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-url" content="https://theater-backend-qf1b.onrender.com/api/schedule">
  <title>Resort Theater</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }

    /* ── Day heading ── */
    .day-heading {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: #1a2535;
      border-bottom: 2px solid #0d6efd;
      padding-bottom: 6px;
      margin-bottom: 12px;
      margin-top: 4px;
    }

    /* ── Show card ── */
    .show-card {
      background: #fff;
      border: 1px solid #d4dde8;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .show-title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: #1a2535;
      line-height: 1.3;
    }
    .show-title.live-title { color: #0d6efd; }

    .live-badge {
      display: inline-block;
      background: #0d6efd;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 1px 6px;
      border-radius: 3px;
      vertical-align: middle;
      margin-right: 5px;
      font-family: 'Inter', sans-serif;
    }

    .show-time {
      font-size: 13px;
      color: #5a6a80;
      margin-top: 3px;
    }

    .show-notes {
      font-size: 12px;
      font-style: italic;
      color: #8a9aaa;
      margin-top: 3px;
    }

    .meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .chip {
      font-size: 11px;
      background: #e9ecef;
      color: #495057;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .show-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .show-links a {
      font-size: 12px;
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }
    .show-links a:hover { text-decoration: underline; }

    .ticket-link a {
      font-size: 12px;
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
    }
    .ticket-link a:hover { text-decoration: underline; }

    /* ── Loading spinner ── */
    .reel-spinner {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 60px 20px 20px;
    }
    .reel-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #0d6efd;
      animation: reelPulse 1.2s ease-in-out infinite;
    }
    .reel-dot:nth-child(2) { animation-delay: 0.2s; }
    .reel-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes reelPulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50%       { transform: scale(1.5); opacity: 1; }
    }
    .loading-text {
      text-align: center;
      color: #6c757d;
      font-size: 14px;
      padding-bottom: 40px;
    }

    /* ── Footer ── */
    .schedule-footer {
      text-align: center;
      padding: 24px 16px 32px;
    }
    .disclaimer {
      font-size: 10px;
      color: #adb5bd;
      max-width: 480px;
      margin: 0 auto 8px;
      line-height: 1.5;
    }

    .no-schedule {
      text-align: center;
      color: #6c757d;
      padding: 60px 20px;
      font-size: 15px;
    }
    .error-msg {
      text-align: center;
      color: #dc3545;
      padding: 60px 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="javascript:history.back()">
        <i class="bi bi-arrow-left me-1"></i>🎬 Resort Theater
      </a>
    </div>
  </nav>

  <div class="container mt-3 pb-4" style="max-width:540px;" id="main">
    <div id="loading">
      <div class="reel-spinner">
        <div class="reel-dot"></div>
        <div class="reel-dot"></div>
        <div class="reel-dot"></div>
      </div>
      <div class="loading-text">Loading schedule…</div>
    </div>
    <div id="schedule" style="display:none;"></div>
    <div id="footer" style="display:none;" class="schedule-footer">
      <p class="disclaimer">Showtimes are subject to change.</p>
      <p class="disclaimer">Movie information provided for convenience only. All movie titles, ratings, and related metadata are the property of their respective owners and studios.</p>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var metaTag = document.querySelector('meta[name="api-url"]');
    var API_URL = (metaTag && metaTag.getAttribute('content')) || '/api/schedule';

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatRuntime(min) {
      if (!min) return '';
      var n = parseInt(min, 10);
      if (isNaN(n) || n <= 0) return '';
      var h = Math.floor(n / 60);
      var m = n % 60;
      if (h > 0 && m > 0) return h + 'h ' + m + 'm';
      if (h > 0) return h + 'h';
      return m + 'm';
    }

    function renderSchedule(days) {
      var scheduleEl = document.getElementById('schedule');
      var footerEl   = document.getElementById('footer');
      var loadingEl  = document.getElementById('loading');

      if (!days || days.length === 0) {
        scheduleEl.innerHTML = '<div class="no-schedule">🎥 No upcoming showings scheduled.</div>';
        loadingEl.style.display = 'none';
        scheduleEl.style.display = 'block';
        footerEl.style.display = 'block';
        return;
      }

      var html = '';

      days.forEach(function (dayObj) {
        html += '<div class="mb-4">';
        html += '<div class="day-heading">' + escapeHtml(dayObj.label) + '</div>';

        var shows = dayObj.shows || [];
        shows.forEach(function (show) {
          var isLive = (show.contentType || '').toLowerCase() === 'live event';

          html += '<div class="show-card">';

          // Title(s)
          html += '<div class="show-title' + (isLive ? ' live-title' : '') + '">';
          if (isLive) html += '<span class="live-badge">LIVE</span>';
          html += escapeHtml(show.title);
          html += '</div>';
          if (show.titleLine2) {
            html += '<div class="show-title' + (isLive ? ' live-title' : '') + '">' + escapeHtml(show.titleLine2) + '</div>';
          }
          if (show.titleLine3) {
            html += '<div class="show-title' + (isLive ? ' live-title' : '') + '">' + escapeHtml(show.titleLine3) + '</div>';
          }

          // Time · Rating · Runtime
          var timeParts = [escapeHtml(show.time)];
          if (show.rating) timeParts.push(escapeHtml(show.rating));
          var rt = formatRuntime(show.runtime);
          if (rt) timeParts.push(escapeHtml(rt));
          html += '<div class="show-time">' + timeParts.join(' &middot; ') + '</div>';

          // Notes
          if (show.notes) {
            html += '<div class="show-notes">' + escapeHtml(show.notes) + '</div>';
          }

          // Ticket link (live events)
          if (isLive && show.ticketUrl) {
            html += '<div class="ticket-link mt-2"><a href="' + escapeHtml(show.ticketUrl) + '" target="_blank" rel="noopener">🎟️ Get Tickets</a></div>';
          }

          // IMDb links (movies)
          if (!isLive && show.imdbUrl) {
            html += '<div class="show-links">';
            html += '<a href="' + escapeHtml(show.imdbUrl) + '" target="_blank" rel="noopener">IMDb ⭐ ' + escapeHtml(show.imdbRating ? String(show.imdbRating) : 'N/A') + '</a>';
            if (show.parentsGuideUrl) {
              html += '<a href="' + escapeHtml(show.parentsGuideUrl) + '" target="_blank" rel="noopener">Parents\' Guide</a>';
            }
            html += '</div>';
          }

          // Meta chips
          var chips = [];
          if (show.year) chips.push(String(show.year));
          if (show.genre) {
            show.genre.split(',').forEach(function (g) {
              var t = g.trim();
              if (t) chips.push(t);
            });
          }
          if (chips.length) {
            html += '<div class="meta-chips">';
            chips.forEach(function (c) {
              html += '<span class="chip">' + escapeHtml(c) + '</span>';
            });
            html += '</div>';
          }

          html += '</div>'; // .show-card
        });

        html += '</div>'; // day block
      });

      scheduleEl.innerHTML = html;
      loadingEl.style.display = 'none';
      scheduleEl.style.display = 'block';
      footerEl.style.display = 'block';
    }

    function fetchSchedule() {
      fetch(API_URL)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(renderSchedule)
        .catch(function (err) {
          console.error('[theater] Fetch failed:', err);
          document.getElementById('loading').innerHTML =
            '<div class="error-msg">Unable to load schedule. Please try again later.</div>';
        });
    }

    document.addEventListener('DOMContentLoaded', fetchSchedule);
  })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
