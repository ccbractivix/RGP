name: Update Now
on:
  workflow_dispatch:

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: none
    steps:
      - name: Trigger immediate update on Render
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_URL }}/admin/cron/nightly" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
