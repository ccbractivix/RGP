<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-url" content="https://channel-backend-uu2s.onrender.com">
  <title>Channel Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f172a;
      --card:        #1e293b;
      --card-border: #334155;
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --green:       #22c55e;
      --green-dim:   rgba(34,197,94,0.15);
      --red:         #ef4444;
      --red-dim:     rgba(239,68,68,0.15);
      --amber:       #f59e0b;
      --amber-dim:   rgba(245,158,11,0.15);
      --blue:        #3b82f6;
      --blue-dim:    rgba(59,130,246,0.15);
      --purple:      #a855f7;
      --purple-dim:  rgba(168,85,247,0.15);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    /* ── Login Screen ──────────────────────────────────────────────────────── */
    #login-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #login-screen h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    #login-screen .subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 13px; }

    .code-input {
      width: 160px; padding: 14px; font-size: 24px;
      font-family: 'Inter', sans-serif; text-align: center; letter-spacing: 8px;
      background: var(--card); color: var(--text);
      border: 2px solid var(--card-border); border-radius: 10px; outline: none;
    }
    .code-input:focus { border-color: var(--blue); }

    .login-btn {
      margin-top: 16px; padding: 12px 40px; font-size: 15px; font-weight: 600;
      background: var(--blue); color: #fff; border: none; border-radius: 8px; cursor: pointer;
    }
    .login-btn:active { opacity: 0.8; }
    .login-error { color: var(--red); margin-top: 12px; font-size: 13px; min-height: 20px; }

    /* ── Dashboard ─────────────────────────────────────────────────────────── */
    #dashboard { display: none; }

    .dash-header {
      background: #020617; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--card-border);
    }
    .dash-header h1 { font-size: 16px; font-weight: 700; }
    .dash-header .right { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 8px 16px; font-size: 13px; font-weight: 600; border: none;
      border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-purple { background: var(--purple); color: #fff; }
    .btn-ghost  { background: transparent; color: var(--text-muted); border: 1px solid var(--card-border); }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Tabs ──────────────────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0; background: #020617;
      border-bottom: 1px solid var(--card-border);
      padding: 0 16px;
    }
    .tab {
      padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'Inter', sans-serif;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover { color: var(--text); }

    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* ── Cards ─────────────────────────────────────────────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

    .card {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 10px;
      padding: 16px; cursor: pointer; transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--blue); }

    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }

    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 4px; vertical-align: middle;
    }
    .status-dot.online  { background: var(--green); }
    .status-dot.offline { background: var(--red); }
    .status-dot.unknown { background: var(--card-border); }

    /* ── Modal ─────────────────────────────────────────────────────────────── */
    .modal-bg {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.6);
      z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 24px; width: 90%; max-width: 700px; max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
    .modal input[type="text"],
    .modal input[type="number"],
    .modal input[type="url"],
    .modal textarea,
    .modal select {
      width: 100%; padding: 10px; font-size: 14px; font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text); border: 1px solid var(--card-border);
      border-radius: 6px; margin-bottom: 12px; outline: none;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--blue); }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ── Slide Editor ─────────────────────────────────────────────────────── */
    .slide-editor { display: flex; gap: 16px; margin-top: 12px; }
    .slide-pool, .slide-playlist {
      flex: 1; min-height: 200px; background: var(--bg); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 8px;
    }
    .slide-pool h3, .slide-playlist h3 {
      font-size: 13px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }

    .slide-item {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 6px;
      padding: 10px 12px; margin-bottom: 6px; cursor: grab; display: flex;
      align-items: center; justify-content: space-between; font-size: 13px;
    }
    .slide-item:active { cursor: grabbing; }
    .slide-item.dragging { opacity: 0.4; }
    .slide-item.drag-over { border-color: var(--blue); background: var(--blue-dim); }

    .slide-item .slide-label { flex: 1; font-weight: 600; }
    .slide-item .slide-duration {
      width: 60px; padding: 4px 6px; font-size: 12px; text-align: center;
      background: var(--bg); color: var(--text); border: 1px solid var(--card-border);
      border-radius: 4px; margin: 0 8px;
    }
    .slide-item .slide-remove {
      background: none; border: none; color: var(--red); cursor: pointer;
      font-size: 16px; padding: 0 4px; font-weight: 700;
    }
    .slide-item .slide-add {
      background: none; border: none; color: var(--green); cursor: pointer;
      font-size: 16px; padding: 0 4px; font-weight: 700;
    }

    /* ── Breakthrough cards ───────────────────────────────────────────────── */
    .bt-card {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 10px;
      padding: 16px; margin-bottom: 8px;
    }
    .bt-card.is-active { border-color: var(--red); background: var(--red-dim); }
    .bt-card .bt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .bt-card .bt-title { font-size: 15px; font-weight: 700; }
    .bt-card .bt-message { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .bt-card .bt-targets { font-size: 12px; color: var(--text-muted); }
    .bt-card .bt-actions { display: flex; gap: 6px; margin-top: 8px; }

    .bt-swatch {
      display: inline-block; width: 20px; height: 20px; border-radius: 4px;
      vertical-align: middle; margin-right: 6px; border: 1px solid var(--card-border);
    }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--card); color: var(--text); padding: 12px 24px;
      border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 3000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none;
    }
    #toast.success { border-left: 4px solid var(--green); }
    #toast.error   { border-left: 4px solid var(--red); }
    #toast.show    { display: block; }

    /* ── Section headers ──────────────────────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
    }
    .section-header h2 { font-size: 16px; font-weight: 700; }

    /* ── Slide expiry warning ─────────────────────────────────────────────── */
    .slide-expiry {
      font-size: 11px; margin-top: 6px;
    }
    .slide-expiry.expiring-soon { color: var(--amber); }
    .slide-expiry.active-expiry { color: var(--text-muted); }

    .source-badge {
      display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 8px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .source-badge.celebration { background: var(--purple-dim); color: var(--purple); }
    .source-badge.manual      { background: var(--blue-dim);   color: var(--blue); }

    /* ── Lightning status badge ───────────────────────────────────────────── */
    .lightning-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
    }
    .lightning-badge.active { background: var(--amber-dim); color: var(--amber); }
    .lightning-badge.inactive { background: var(--green-dim); color: var(--green); }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .slide-editor { flex-direction: column; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
  <div id="login-screen">
    <h1>Channel Manager</h1>
    <p class="subtitle">Enter your access code</p>
    <input type="password" class="code-input" id="code-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    <button class="login-btn" id="login-btn">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <!-- ═══════════════════ DASHBOARD ═══════════════════ -->
  <div id="dashboard">
    <div class="dash-header">
      <h1>📺 Channel Manager</h1>
      <div class="right">
        <span id="lightning-status"></span>
        <button class="btn btn-ghost" id="logout-btn">Logout</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="channels">Channels</button>
      <button class="tab" data-tab="slides">Slides Library</button>
      <button class="tab" data-tab="breakthroughs">Breakthroughs</button>
      <button class="tab" data-tab="monitor">Monitor</button>
    </div>

    <!-- ─── Channels Tab ─── -->
    <div class="tab-content active" id="tab-channels">
      <div class="section-header">
        <h2>Channels</h2>
        <button class="btn btn-blue" id="new-channel-btn">+ New Channel</button>
      </div>
      <div class="card-grid" id="channel-grid"></div>
    </div>

    <!-- ─── Slides Library Tab ─── -->
    <div class="tab-content" id="tab-slides">
      <div class="section-header">
        <h2>Available Slides</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" id="clean-expired-btn">🗑 Clean Expired</button>
          <button class="btn btn-blue" id="new-slide-btn">+ Register Slide</button>
        </div>
      </div>
      <div class="card-grid" id="slide-grid"></div>
    </div>

    <!-- ─── Breakthroughs Tab ─── -->
    <div class="tab-content" id="tab-breakthroughs">
      <div class="section-header">
        <h2>Breakthroughs</h2>
        <button class="btn btn-red" id="new-bt-btn">+ New Breakthrough</button>
      </div>
      <div id="bt-list"></div>
    </div>

    <!-- ─── Monitor Tab ─── -->
    <div class="tab-content" id="tab-monitor">
      <div class="section-header">
        <h2>TV Heartbeats</h2>
      </div>
      <div class="card-grid" id="heartbeat-grid"></div>
    </div>
  </div>

  <!-- ═══════════════════ CHANNEL EDITOR MODAL ═══════════════════ -->
  <div class="modal-bg" id="channel-modal">
    <div class="modal">
      <h2 id="channel-modal-title">Edit Channel</h2>
      <input type="hidden" id="ch-edit-id">

      <label>Channel ID (lowercase, hyphens only)</label>
      <input type="text" id="ch-edit-slug" placeholder="e.g. front-lobby" pattern="[a-z0-9-]+">

      <label>Display Name</label>
      <input type="text" id="ch-edit-name" placeholder="e.g. Front Lobby">

      <label style="margin-top:8px">Lightning Alert Rule</label>
      <select id="ch-edit-lightning">
        <option value="0">Disabled — no lightning banner</option>
        <option value="1">Enabled — show banner when lightning is active</option>
      </select>

      <h3 style="font-size:14px; margin: 16px 0 8px;">Slide Playlist</h3>
      <div class="slide-editor">
        <div class="slide-pool">
          <h3>Available Slides</h3>
          <div id="pool-slides"></div>
        </div>
        <div class="slide-playlist">
          <h3>Playlist (drag to reorder)</h3>
          <div id="playlist-slides"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="ch-cancel-btn">Cancel</button>
        <button class="btn btn-ghost" id="ch-preview-btn">Preview ↗</button>
        <button class="btn btn-ghost btn-red" id="ch-delete-btn" style="color:var(--red)">Delete</button>
        <button class="btn btn-blue" id="ch-save-btn">Save Channel</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ SLIDE REGISTER MODAL ═══════════════════ -->
  <div class="modal-bg" id="slide-modal">
    <div class="modal">
      <h2>Register New Slide</h2>
      <label>URL</label>
      <input type="url" id="sl-url" placeholder="https://example.com/page.html">
      <label>Label</label>
      <input type="text" id="sl-label" placeholder="e.g. Welcome Screen">
      <label>Description (optional)</label>
      <textarea id="sl-desc" placeholder="What this slide shows"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="sl-cancel-btn">Cancel</button>
        <button class="btn btn-blue" id="sl-save-btn">Register</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ BREAKTHROUGH MODAL ═══════════════════ -->
  <div class="modal-bg" id="bt-modal">
    <div class="modal">
      <h2 id="bt-modal-title">New Breakthrough</h2>
      <input type="hidden" id="bt-edit-id">
      <label>Title (shown large on screen)</label>
      <input type="text" id="bt-title" placeholder="e.g. EMERGENCY NOTICE">
      <label>Message</label>
      <textarea id="bt-message" placeholder="The message displayed below the title"></textarea>
      <label>Background Color</label>
      <input type="text" id="bt-bg" value="#D32F2F" placeholder="#D32F2F">
      <label>Text Color</label>
      <input type="text" id="bt-color" value="#FFFFFF" placeholder="#FFFFFF">
      <label>Target Channels (leave empty for ALL channels)</label>
      <div id="bt-channel-checkboxes" style="margin-bottom:12px"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="bt-cancel-btn">Cancel</button>
        <button class="btn btn-blue" id="bt-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ TOAST ═══════════════════ -->
  <div id="toast"></div>

<script>
(function() {
  'use strict';

  /* ── Config ─────────────────────────────────────────────────────────────── */
  const API = document.querySelector('meta[name="api-url"]')?.content || '';
  const PLAYER_BASE = window.location.href.replace(/\/[^/]*$/, '/player.html');
  let authCode = localStorage.getItem('channel_code') || '';

  /* ── DOM refs ───────────────────────────────────────────────────────────── */
  const loginScreen   = document.getElementById('login-screen');
  const dashboard     = document.getElementById('dashboard');
  const codeInput     = document.getElementById('code-input');
  const loginBtn      = document.getElementById('login-btn');
  const loginError    = document.getElementById('login-error');
  const logoutBtn     = document.getElementById('logout-btn');
  const channelGrid   = document.getElementById('channel-grid');
  const slideGrid     = document.getElementById('slide-grid');
  const btList        = document.getElementById('bt-list');
  const heartbeatGrid = document.getElementById('heartbeat-grid');
  const toastEl       = document.getElementById('toast');
  const lightningEl   = document.getElementById('lightning-status');

  /* ── State ──────────────────────────────────────────────────────────────── */
  let allChannels = [];
  let allSlides   = [];
  let playlistItems = []; // current editor state
  let dragItem    = null;

  /* ── Helpers ────────────────────────────────────────────────────────────── */
  function headers() {
    return { 'Content-Type': 'application/json', 'X-Auth-Code': authCode };
  }

  async function api(method, path, body) {
    const opts = { method, headers: headers() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API}${path}`, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  function toast(msg, type) {
    toastEl.textContent = msg;
    toastEl.className = `show ${type || 'success'}`;
    setTimeout(() => { toastEl.className = ''; }, 3000);
  }

  function timeAgo(iso) {
    if (!iso) return 'Never';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function heartbeatStatus(iso) {
    if (!iso) return 'unknown';
    const diff = Date.now() - new Date(iso).getTime();
    return diff < 120_000 ? 'online' : 'offline';
  }

  /* ══════════════════════════════════════════════════════════════════════════
     AUTH
     ══════════════════════════════════════════════════════════════════════════ */

  async function tryLogin(code) {
    try {
      const data = await fetch(`${API}/admin/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      }).then(r => r.json());

      if (data.valid) {
        authCode = code;
        localStorage.setItem('channel_code', code);
        showDashboard();
      } else {
        loginError.textContent = 'Invalid code';
      }
    } catch (e) {
      loginError.textContent = 'Connection error';
    }
  }

  function showDashboard() {
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    loadAll();
  }

  function logout() {
    authCode = '';
    localStorage.removeItem('channel_code');
    dashboard.style.display = 'none';
    loginScreen.style.display = 'flex';
    codeInput.value = '';
    loginError.textContent = '';
  }

  loginBtn.addEventListener('click', () => tryLogin(codeInput.value.trim()));
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(codeInput.value.trim()); });
  logoutBtn.addEventListener('click', logout);

  /* ══════════════════════════════════════════════════════════════════════════
     TABS
     ══════════════════════════════════════════════════════════════════════════ */

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

      // Refresh data when switching tabs
      if (tab.dataset.tab === 'monitor') loadHeartbeats();
      if (tab.dataset.tab === 'breakthroughs') loadBreakthroughs();
    });
  });

  /* ══════════════════════════════════════════════════════════════════════════
     LOAD ALL DATA
     ══════════════════════════════════════════════════════════════════════════ */

  async function loadAll() {
    try {
      const [chData, slData, ltData] = await Promise.all([
        api('GET', '/admin/channels'),
        api('GET', '/admin/slides'),
        api('GET', '/admin/lightning'),
      ]);
      allChannels = chData.channels || [];
      allSlides   = slData.slides || [];
      renderChannels();
      renderSlides();
      renderLightning(ltData);
      loadBreakthroughs();
      loadHeartbeats();
    } catch (e) {
      toast('Failed to load data: ' + e.message, 'error');
    }
  }

  /* ══════════════════════════════════════════════════════════════════════════
     CHANNELS
     ══════════════════════════════════════════════════════════════════════════ */

  function renderChannels() {
    channelGrid.innerHTML = '';
    allChannels.forEach(ch => {
      const hbStatus = heartbeatStatus(ch.heartbeat);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-title">${esc(ch.name)}</div>
        <div class="card-subtitle">${esc(ch.id)}</div>
        <div class="card-meta">
          <span>${ch.slide_count || 0} slides</span>
          <span><span class="status-dot ${hbStatus}"></span>${hbStatus === 'online' ? 'Online' : hbStatus === 'offline' ? 'Offline' : 'No data'}</span>
          <span>${ch.heartbeat ? timeAgo(ch.heartbeat) : ''}</span>
        </div>
      `;
      card.addEventListener('click', () => openChannelEditor(ch.id));
      channelGrid.appendChild(card);
    });
  }

  /* ── Channel Editor Modal ─────────────────────────────────────────────── */
  const chModal     = document.getElementById('channel-modal');
  const chTitle     = document.getElementById('channel-modal-title');
  const chId        = document.getElementById('ch-edit-id');
  const chSlug      = document.getElementById('ch-edit-slug');
  const chName      = document.getElementById('ch-edit-name');
  const chLightning = document.getElementById('ch-edit-lightning');
  const chSave      = document.getElementById('ch-save-btn');
  const chCancel    = document.getElementById('ch-cancel-btn');
  const chDelete    = document.getElementById('ch-delete-btn');
  const chPreview   = document.getElementById('ch-preview-btn');
  const poolSlides  = document.getElementById('pool-slides');
  const playlistEl  = document.getElementById('playlist-slides');

  document.getElementById('new-channel-btn').addEventListener('click', () => {
    chTitle.textContent = 'New Channel';
    chId.value = '';
    chSlug.value = '';
    chSlug.disabled = false;
    chName.value = '';
    chLightning.value = '0';
    chDelete.style.display = 'none';
    chPreview.style.display = 'none';
    playlistItems = [];
    renderSlideEditor();
    chModal.classList.add('open');
  });

  async function openChannelEditor(id) {
    try {
      const [slideData, ruleData] = await Promise.all([
        api('GET', `/admin/channels/${id}/slides`),
        api('GET', `/admin/channels/${id}/rules`),
      ]);
      const ch = allChannels.find(c => c.id === id);
      chTitle.textContent = `Edit: ${ch.name}`;
      chId.value = id;
      chSlug.value = id;
      chSlug.disabled = true;
      chName.value = ch.name;

      const ltRule = (ruleData.rules || []).find(r => r.rule_type === 'lightning_alert');
      chLightning.value = ltRule && ltRule.enabled ? '1' : '0';

      chDelete.style.display = '';
      chPreview.style.display = '';

      playlistItems = (slideData.slides || []).map(s => ({
        url: s.slide_url,
        label: s.label || s.slide_url,
        duration: s.duration_sec || 30,
      }));

      renderSlideEditor();
      chModal.classList.add('open');
    } catch (e) {
      toast('Failed to load channel: ' + e.message, 'error');
    }
  }

  function renderSlideEditor() {
    // Pool: available slides not already in playlist
    const playlistUrls = new Set(playlistItems.map(p => p.url));
    poolSlides.innerHTML = '';
    allSlides.forEach(s => {
      if (playlistUrls.has(s.url)) return;
      const el = document.createElement('div');
      el.className = 'slide-item';
      el.innerHTML = `
        <span class="slide-label">${esc(s.label)}</span>
        <button class="slide-add" title="Add to playlist">+</button>
      `;
      el.querySelector('.slide-add').addEventListener('click', () => {
        playlistItems.push({ url: s.url, label: s.label, duration: 30 });
        renderSlideEditor();
      });
      poolSlides.appendChild(el);
    });

    // Playlist: ordered slides with duration and drag reorder
    playlistEl.innerHTML = '';
    playlistItems.forEach((item, idx) => {
      const el = document.createElement('div');
      el.className = 'slide-item';
      el.draggable = true;
      el.dataset.idx = idx;
      el.innerHTML = `
        <span class="slide-label">${esc(item.label || item.url)}</span>
        <input type="number" class="slide-duration" value="${item.duration}" min="5" max="600" title="Duration (seconds)">
        <span style="font-size:11px;color:var(--text-muted)">sec</span>
        <button class="slide-remove" title="Remove">×</button>
      `;

      // Duration change
      el.querySelector('.slide-duration').addEventListener('change', (e) => {
        playlistItems[idx].duration = Math.max(5, Math.min(600, parseInt(e.target.value) || 30));
      });

      // Remove
      el.querySelector('.slide-remove').addEventListener('click', () => {
        playlistItems.splice(idx, 1);
        renderSlideEditor();
      });

      // Drag handlers for reordering
      el.addEventListener('dragstart', (e) => {
        dragItem = idx;
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        dragItem = null;
      });
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('drag-over');
        if (dragItem === null || dragItem === idx) return;
        const moved = playlistItems.splice(dragItem, 1)[0];
        playlistItems.splice(idx, 0, moved);
        renderSlideEditor();
      });

      playlistEl.appendChild(el);
    });

    if (playlistItems.length === 0) {
      playlistEl.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px;text-align:center">Click + on available slides to add them</div>';
    }
  }

  chCancel.addEventListener('click', () => chModal.classList.remove('open'));
  chPreview.addEventListener('click', () => {
    window.open(`${PLAYER_BASE}?channel=${chSlug.value}`, '_blank');
  });

  chDelete.addEventListener('click', async () => {
    if (!confirm(`Delete channel "${chName.value}"? This cannot be undone.`)) return;
    try {
      await api('DELETE', `/admin/channels/${chId.value}`);
      toast('Channel deleted');
      chModal.classList.remove('open');
      loadAll();
    } catch (e) {
      toast('Delete failed: ' + e.message, 'error');
    }
  });

  chSave.addEventListener('click', async () => {
    const slug = chSlug.value.trim();
    const name = chName.value.trim();
    if (!slug || !name) return toast('ID and name required', 'error');
    if (!/^[a-z0-9-]+$/.test(slug)) return toast('ID must be lowercase with hyphens only', 'error');

    // Read durations from inputs before saving
    playlistEl.querySelectorAll('.slide-item').forEach((el, idx) => {
      const input = el.querySelector('.slide-duration');
      if (input && playlistItems[idx]) {
        playlistItems[idx].duration = Math.max(5, Math.min(600, parseInt(input.value) || 30));
      }
    });

    try {
      const isNew = !chId.value;
      if (isNew) {
        await api('POST', '/admin/channels', { id: slug, name });
      } else {
        await api('PUT', `/admin/channels/${slug}`, { name });
      }

      // Save slides
      await api('PUT', `/admin/channels/${slug}/slides`, { slides: playlistItems });

      // Save lightning rule
      await api('PUT', `/admin/channels/${slug}/rules`, {
        rule_type: 'lightning_alert',
        enabled: chLightning.value === '1',
      });

      toast(isNew ? 'Channel created!' : 'Channel saved!');
      chModal.classList.remove('open');
      loadAll();
    } catch (e) {
      toast('Save failed: ' + e.message, 'error');
    }
  });

  /* ══════════════════════════════════════════════════════════════════════════
     SLIDES LIBRARY
     ══════════════════════════════════════════════════════════════════════════ */

  function renderSlides() {
    slideGrid.innerHTML = '';
    if (allSlides.length === 0) {
      slideGrid.innerHTML = '<div style="color:var(--text-muted);padding:20px">No slides registered yet.</div>';
      return;
    }
    const now = Date.now();
    allSlides.forEach(s => {
      const card = document.createElement('div');
      card.className = 'card';

      const source = s.source || 'manual';
      const sourceBadge = `<span class="source-badge ${source}">${source === 'celebration' ? '🎉 Celebration' : 'Manual'}</span>`;

      let expiryHtml = '';
      if (s.expires_at) {
        const exp = new Date(s.expires_at);
        const diff = exp.getTime() - now;
        const fmtExp = exp.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        if (diff <= 0) {
          expiryHtml = `<div class="slide-expiry" style="color:var(--red)">⚠ Expired ${fmtExp}</div>`;
        } else if (diff < 86400000) {
          expiryHtml = `<div class="slide-expiry expiring-soon">⏳ Expires today (${fmtExp})</div>`;
        } else {
          expiryHtml = `<div class="slide-expiry active-expiry">Expires ${fmtExp}</div>`;
        }
      }

      card.innerHTML = `
        ${sourceBadge}
        <div class="card-title">${esc(s.label)}</div>
        <div class="card-subtitle" style="word-break:break-all">${esc(s.url)}</div>
        <div class="card-meta">
          <span>${esc(s.description || '')}</span>
        </div>
        ${expiryHtml}
        <div style="margin-top:8px">
          <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" data-del="${s.id}">Remove</button>
        </div>
      `;
      card.querySelector('[data-del]').addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm(`Remove "${s.label}" from the slide library?`)) return;
        try {
          await api('DELETE', `/admin/slides/${s.id}`);
          toast('Slide removed');
          loadAll();
        } catch (err) {
          toast('Failed: ' + err.message, 'error');
        }
      });
      slideGrid.appendChild(card);
    });
  }

  const slModal  = document.getElementById('slide-modal');
  const slUrl    = document.getElementById('sl-url');
  const slLabel  = document.getElementById('sl-label');
  const slDesc   = document.getElementById('sl-desc');

  document.getElementById('clean-expired-btn').addEventListener('click', async () => {
    try {
      const data = await api('DELETE', '/admin/slides/expired');
      toast(data.purged > 0 ? `Removed ${data.purged} expired slide${data.purged !== 1 ? 's' : ''} from library and playlists.` : 'No expired slides found.', 'success');
      loadAll();
    } catch (e) {
      toast('Clean failed: ' + e.message, 'error');
    }
  });

  document.getElementById('new-slide-btn').addEventListener('click', () => {
    slUrl.value = ''; slLabel.value = ''; slDesc.value = '';
    slModal.classList.add('open');
  });
  document.getElementById('sl-cancel-btn').addEventListener('click', () => slModal.classList.remove('open'));
  document.getElementById('sl-save-btn').addEventListener('click', async () => {
    const url = slUrl.value.trim();
    const label = slLabel.value.trim();
    if (!url || !label) return toast('URL and label required', 'error');
    try {
      await api('POST', '/admin/slides', { url, label, description: slDesc.value.trim() });
      toast('Slide registered!');
      slModal.classList.remove('open');
      loadAll();
    } catch (e) {
      toast('Failed: ' + e.message, 'error');
    }
  });

  /* ══════════════════════════════════════════════════════════════════════════
     BREAKTHROUGHS
     ══════════════════════════════════════════════════════════════════════════ */

  async function loadBreakthroughs() {
    try {
      const data = await api('GET', '/admin/breakthroughs');
      renderBreakthroughs(data.breakthroughs || []);
    } catch (e) {
      console.error('Failed to load breakthroughs:', e);
    }
  }

  function renderBreakthroughs(bts) {
    btList.innerHTML = '';
    if (bts.length === 0) {
      btList.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No breakthroughs configured. Create one to get started.</div>';
      return;
    }
    bts.forEach(bt => {
      const card = document.createElement('div');
      card.className = `bt-card ${bt.active ? 'is-active' : ''}`;
      const targets = bt.target_channels && bt.target_channels.length > 0
        ? bt.target_channels.join(', ')
        : 'All channels';
      card.innerHTML = `
        <div class="bt-header">
          <div>
            <span class="bt-swatch" style="background:${esc(bt.bg_color)}"></span>
            <span class="bt-title">${esc(bt.title)}</span>
            ${bt.active ? '<span style="color:var(--red);font-size:12px;font-weight:700;margin-left:8px">● LIVE</span>' : ''}
          </div>
        </div>
        <div class="bt-message">${esc(bt.message)}</div>
        <div class="bt-targets">Targets: ${esc(targets)}</div>
        <div class="bt-actions">
          ${bt.active
            ? '<button class="btn btn-green" data-deact="' + bt.id + '">Deactivate</button>'
            : '<button class="btn btn-red" data-act="' + bt.id + '">🚨 ACTIVATE</button>'
          }
          <button class="btn btn-ghost" data-edit-bt="${bt.id}">Edit</button>
          <button class="btn btn-ghost" style="color:var(--red)" data-del-bt="${bt.id}">Delete</button>
        </div>
      `;

      // Activate
      const actBtn = card.querySelector('[data-act]');
      if (actBtn) actBtn.addEventListener('click', async () => {
        if (!confirm('ACTIVATE this breakthrough? It will immediately display on targeted channels.')) return;
        try {
          await api('POST', `/admin/breakthroughs/${bt.id}/activate`);
          toast('Breakthrough ACTIVATED', 'success');
          loadBreakthroughs();
        } catch (e) { toast('Failed: ' + e.message, 'error'); }
      });

      // Deactivate
      const deactBtn = card.querySelector('[data-deact]');
      if (deactBtn) deactBtn.addEventListener('click', async () => {
        try {
          await api('POST', `/admin/breakthroughs/${bt.id}/deactivate`);
          toast('Breakthrough deactivated');
          loadBreakthroughs();
        } catch (e) { toast('Failed: ' + e.message, 'error'); }
      });

      // Edit
      card.querySelector('[data-edit-bt]').addEventListener('click', () => openBtEditor(bt));

      // Delete
      card.querySelector('[data-del-bt]').addEventListener('click', async () => {
        if (!confirm('Delete this breakthrough?')) return;
        try {
          await api('DELETE', `/admin/breakthroughs/${bt.id}`);
          toast('Breakthrough deleted');
          loadBreakthroughs();
        } catch (e) { toast('Failed: ' + e.message, 'error'); }
      });

      btList.appendChild(card);
    });
  }

  /* ── Breakthrough Editor Modal ────────────────────────────────────────── */
  const btModal   = document.getElementById('bt-modal');
  const btMTitle  = document.getElementById('bt-modal-title');
  const btEditId  = document.getElementById('bt-edit-id');
  const btTitleIn = document.getElementById('bt-title');
  const btMsgIn   = document.getElementById('bt-message');
  const btBgIn    = document.getElementById('bt-bg');
  const btColorIn = document.getElementById('bt-color');
  const btChBoxes = document.getElementById('bt-channel-checkboxes');

  document.getElementById('new-bt-btn').addEventListener('click', () => {
    btMTitle.textContent = 'New Breakthrough';
    btEditId.value = '';
    btTitleIn.value = '';
    btMsgIn.value = '';
    btBgIn.value = '#D32F2F';
    btColorIn.value = '#FFFFFF';
    renderBtChannelCheckboxes([]);
    btModal.classList.add('open');
  });

  function openBtEditor(bt) {
    btMTitle.textContent = 'Edit Breakthrough';
    btEditId.value = bt.id;
    btTitleIn.value = bt.title;
    btMsgIn.value = bt.message;
    btBgIn.value = bt.bg_color || '#D32F2F';
    btColorIn.value = bt.text_color || '#FFFFFF';
    renderBtChannelCheckboxes(bt.target_channels || []);
    btModal.classList.add('open');
  }

  function renderBtChannelCheckboxes(selected) {
    btChBoxes.innerHTML = '';
    allChannels.forEach(ch => {
      const label = document.createElement('label');
      label.style.cssText = 'display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:13px;cursor:pointer';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = ch.id;
      cb.checked = selected.includes(ch.id);
      label.appendChild(cb);
      label.appendChild(document.createTextNode(ch.name));
      btChBoxes.appendChild(label);
    });
  }

  document.getElementById('bt-cancel-btn').addEventListener('click', () => btModal.classList.remove('open'));
  document.getElementById('bt-save-btn').addEventListener('click', async () => {
    const title = btTitleIn.value.trim();
    const message = btMsgIn.value.trim();
    if (!title || !message) return toast('Title and message required', 'error');

    const checkedIds = [...btChBoxes.querySelectorAll('input:checked')].map(cb => cb.value);

    const body = {
      title, message,
      bg_color: btBgIn.value.trim() || '#D32F2F',
      text_color: btColorIn.value.trim() || '#FFFFFF',
      target_channels: checkedIds.length > 0 ? checkedIds : null,
    };

    try {
      if (btEditId.value) {
        await api('PUT', `/admin/breakthroughs/${btEditId.value}`, body);
        toast('Breakthrough updated');
      } else {
        await api('POST', '/admin/breakthroughs', body);
        toast('Breakthrough created!');
      }
      btModal.classList.remove('open');
      loadBreakthroughs();
    } catch (e) {
      toast('Failed: ' + e.message, 'error');
    }
  });

  /* ══════════════════════════════════════════════════════════════════════════
     MONITOR / HEARTBEATS
     ══════════════════════════════════════════════════════════════════════════ */

  async function loadHeartbeats() {
    try {
      const data = await api('GET', '/admin/heartbeats');
      renderHeartbeats(data.heartbeats || []);
    } catch (e) {
      console.error('Failed to load heartbeats:', e);
    }
  }

  function renderHeartbeats(hbs) {
    heartbeatGrid.innerHTML = '';
    if (hbs.length === 0) {
      heartbeatGrid.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">No heartbeats received yet. Open a player URL to start monitoring.</div>';
      return;
    }
    // Merge with channel data
    const channelMap = {};
    allChannels.forEach(c => { channelMap[c.id] = c; });

    hbs.forEach(hb => {
      const ch = channelMap[hb.channel_id];
      const status = heartbeatStatus(hb.last_seen);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.cursor = 'default';
      card.innerHTML = `
        <div class="card-title">
          <span class="status-dot ${status}"></span>
          ${esc(ch ? ch.name : hb.channel_id)}
        </div>
        <div class="card-subtitle">${esc(hb.channel_id)}</div>
        <div class="card-meta">
          <span>Last seen: ${timeAgo(hb.last_seen)}</span>
        </div>
      `;
      heartbeatGrid.appendChild(card);
    });
  }

  /* ══════════════════════════════════════════════════════════════════════════
     LIGHTNING STATUS
     ══════════════════════════════════════════════════════════════════════════ */

  function renderLightning(data) {
    if (data.active) {
      lightningEl.innerHTML = '<span class="lightning-badge active">⚡ Lightning Active</span>';
    } else {
      lightningEl.innerHTML = '<span class="lightning-badge inactive">☀️ Clear</span>';
    }
  }

  /* ══════════════════════════════════════════════════════════════════════════
     UTILS
     ══════════════════════════════════════════════════════════════════════════ */

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     INIT
     ══════════════════════════════════════════════════════════════════════════ */

  if (authCode) {
    // Verify stored code is still valid
    fetch(`${API}/admin/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: authCode }),
    }).then(r => r.json()).then(d => {
      if (d.valid) showDashboard();
      else logout();
    }).catch(() => {
      // Offline — show dashboard anyway (will fail on API calls)
      showDashboard();
    });
  }
})();
</script>
</body>
</html>
