<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Theater Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #1a1a1a;
      --card-bg:    #242424;
      --border:     #333333;
      --gold:       #c8a45a;
      --gold-hover: #d9b96e;
      --gold-dark:  #a8843a;
      --text:       #e8e8e8;
      --text-muted: #888888;
      --error:      #e05555;
      --shadow:     0 8px 32px rgba(0, 0, 0, 0.6);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(200, 164, 90, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200, 164, 90, 0.03) 0%, transparent 50%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2.25rem 2.25rem;
      box-shadow: var(--shadow);
    }

    .logo-row {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      font-size: 2.5rem;
      line-height: 1;
      margin-bottom: 0.75rem;
      display: block;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .logo-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 0.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }

    input[type="password"]::placeholder {
      color: #555;
      letter-spacing: 0.03em;
    }

    input[type="password"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200, 164, 90, 0.15);
    }

    #btn-login {
      width: 100%;
      background: var(--gold);
      color: #1a1a1a;
      border: none;
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.8rem 1rem;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    #btn-login:hover {
      background: var(--gold-hover);
      box-shadow: 0 4px 16px rgba(200, 164, 90, 0.3);
    }

    #btn-login:active {
      background: var(--gold-dark);
      transform: translateY(1px);
    }

    #btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #btn-login .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(26, 26, 26, 0.4);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error-msg {
      display: none;
      background: rgba(224, 85, 85, 0.1);
      border: 1px solid rgba(224, 85, 85, 0.4);
      border-radius: 7px;
      color: var(--error);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.65rem 0.9rem;
      margin-top: 1rem;
      text-align: center;
    }

    #error-msg.visible {
      display: block;
    }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: #444;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-row">
        <span class="logo-icon">🎬</span>
        <div class="logo-title">Theater Management System</div>
        <div class="logo-subtitle">Admin Login</div>
      </div>

      <hr class="divider" />

      <div class="form-group">
        <label for="passphrase">Passphrase</label>
        <input
          type="password"
          id="passphrase"
          placeholder="Enter passphrase"
          autocomplete="current-password"
          spellcheck="false"
        />
      </div>

      <button id="btn-login" type="button">Sign In</button>

      <div id="error-msg">Invalid passphrase. Please try again.</div>
    </div>

    <div class="footer-note">Theater Management System &copy; 2025</div>
  </div>

  <script>
    (function () {
      const passphraseInput = document.getElementById('passphrase');
      const loginBtn        = document.getElementById('btn-login');
      const errorMsg        = document.getElementById('error-msg');

      function showError() {
        errorMsg.classList.add('visible');
        passphraseInput.focus();
        passphraseInput.select();
      }

      function hideError() {
        errorMsg.classList.remove('visible');
      }

      function setLoading(loading) {
        loginBtn.disabled = loading;
        loginBtn.innerHTML = loading
          ? '<span class="spinner"></span>Signing in…'
          : 'Sign In';
      }

      async function doLogin() {
        const passphrase = passphraseInput.value;
        if (!passphrase) {
          showError();
          return;
        }

        hideError();
        setLoading(true);

        try {
          const res = await fetch('/admin/login', {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json',
              'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ passphrase })
          });

          if (res.ok) {
            window.location.href = '/admin-ui/dashboard.html';
          } else {
            setLoading(false);
            showError();
          }
        } catch (err) {
          setLoading(false);
          showError();
        }
      }

      loginBtn.addEventListener('click', doLogin);

      passphraseInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin();
      });

      passphraseInput.addEventListener('input', hideError);

      document.addEventListener('DOMContentLoaded', function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
          showError();
        }
        passphraseInput.focus();
      });
    })();
  </script>
</body>
</html>
