<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida Space Launch Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Florida Launch Tracker</h1>
            <p class="subtitle">Kennedy Space Center & Cape Canaveral</p>
            <p class="date-range" id="dateRange"></p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching launches...</p>
        </div>

        <div id="error" class="error" style="display:none;">
            <p>⚠️ Couldn't load launch data</p>
            <button class="retry-btn" id="retryBtn">Try Again</button>
        </div>

        <div id="launchList" class="launch-list" style="display:none;"></div>

        <div id="noLaunches" class="no-launches" style="display:none;">
            <p>🛸 No launches scheduled in the next 14 days</p>
        </div>

        <footer>
            <p>Data from Launch Library 2 • Auto-refreshes every 5 min</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
