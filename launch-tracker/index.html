<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida Space Launch Tracker</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Florida Launch Tracker</h1>
            <p class="subtitle">Kennedy Space Center & Cape Canaveral</p>
            <p id="last-refresh"></p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching launches...</p>
        </div>

        <div id="launches-container" class="launch-list"></div>

        <footer>
            <p>Data from Launch Library 2 • Auto-refreshes every 5 min</p>
        </footer>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
