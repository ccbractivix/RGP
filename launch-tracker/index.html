<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida Space Launch Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Florida Launch Tracker</h1>
            <p class="subtitle">Kennedy Space Center & Cape Canaveral</p>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading launch data...</p>
        </div>

        <div id="error" class="error" style="display:none;">
            <p>⚠️ Unable to load launch data</p>
            <button id="retryBtn" class="retry-btn">Try Again</button>
        </div>

        <div id="launchCard" class="launch-card" style="display:none;">
            <div id="statusBadge" class="status-badge">GO</div>
            <h2 id="missionName" class="mission-name"></h2>
            <p id="rocketName" class="rocket-name"></p>
            <div id="countdown" class="countdown"></div>
            <div class="details">
                <div class="detail-row">
                    <span class="label">📅 Date:</span>
                    <span id="launchDate" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">🕐 Time:</span>
                    <span id="launchTime" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">📍 Pad:</span>
                    <span id="launchPad" class="value"></span>
                </div>
                <div class="detail-row">
                    <span class="label">🏢 Provider:</span>
                    <span id="provider" class="value"></span>
                </div>
            </div>
            <div id="missionDescription" class="mission-description" style="display:none;">
                <button id="descToggle" class="desc-toggle">📋 Mission Details ▼</button>
                <p id="descText" class="desc-text" style="display:none;"></p>
            </div>
        </div>

        <div id="noLaunches" class="no-launches" style="display:none;">
            <p>🔭 No launches scheduled in the next 14 days</p>
        </div>

        <footer>
            <p>Auto-refreshes every 5 minutes • Data from Launch Library 2</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
