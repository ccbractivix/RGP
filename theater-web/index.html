<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="api-url" content="https://theater-backend-qf1b.onrender.com/api/schedule">
  <title>Theater Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading">
    <div class="film-reel">
      <div class="reel-circle"></div>
      <div class="reel-circle"></div>
      <div class="reel-circle"></div>
    </div>
    <p style="margin-top:18px;font-family:'Inter',sans-serif;color:#888;font-size:14px;">Loading schedule...</p>
  </div>
  <div id="schedule-container" style="display:none;"></div>
  <div id="footer" style="display:none;">
    <p class="disclaimer-text">Showtimes are subject to change.</p>
    <div class="footer-divider"></div>
    <p class="disclaimer-text" style="font-size:9px;">
      Movie information provided for convenience only. All movie titles, posters, ratings, and related metadata
      are the property of their respective owners and studios.
    </p>
    <div class="return-footer">
      <a href="#" class="return-bubble" id="back-to-top">Back to Top</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
