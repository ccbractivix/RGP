<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- UPDATE: Set this to your go4launch-backend Render URL after deployment -->
    <meta name="api-base" content="https://go4launch-backend.onrender.com">
    <title>go4launch</title>
    <link rel="preconnect" href="https://lldev.thespacedevs.com">
    <link rel="dns-prefetch" href="https://lldev.thespacedevs.com">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-rocket">🚀</div>
        <p>Loading launches…</p>
    </div>

    <!-- Header Logo -->
    <div style="text-align:center;padding:1.5rem 1rem 0;">
        <img src="images/go4launch_landscape_t.png" alt="Go4Launch" style="max-width:400px;width:80%;height:auto;">
    </div>

    <!-- App Container (SPA) -->
    <div id="app"></div>

    <!-- Rocket Talk LIVE! Popup -->
    <div class="modal-overlay" id="rtl-popup">
        <div class="modal-card rtl-popup-card">
            <button class="modal-close" id="rtl-popup-close" aria-label="Close">&times;</button>
            <div class="modal-icon">🎙️</div>
            <h3>Don't miss Rocket Talk LIVE!</h3>
            <p id="rtl-popup-day" class="rtl-popup-day"></p>
            <p id="rtl-popup-datetime" class="rtl-popup-datetime"></p>
            <p class="rtl-popup-supporting">Supporting this launch</p>
            <p id="rtl-popup-vehicle" class="rtl-popup-vehicle"></p>
        </div>
    </div>

    <!-- "I Saw This" Email Modal -->
    <div class="modal-overlay" id="saw-it-modal">
        <div class="modal-card">
            <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
            <div class="modal-icon">🎉</div>
            <h3>I Saw This Launch!</h3>
            <p>Enter your email and we'll send you a link to the photo gallery for this launch.</p>
            <input type="email" id="saw-it-email" placeholder="you@example.com" autocomplete="email">
            <button class="btn-primary" id="saw-it-submit">Send Me the Link</button>
            <div id="saw-it-status"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
